<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RipTide</title>
  <meta property="og:title" content="RipTide">
  <meta property="og:description" content="Download SoundCloud tracks in MP3, WAV, AAC, FLAC at 320kbps. Playlist support with zip export.">
  <meta property="og:image" content="/og-image.svg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RipTide">
  <meta name="twitter:description" content="Download SoundCloud tracks in MP3, WAV, AAC, FLAC at 320kbps.">
  <meta name="twitter:image" content="/og-image.svg">
  <meta name="description" content="Download SoundCloud tracks and playlists in MP3, WAV, AAC, FLAC at 320kbps. Playlist zip export included.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="/wavesurfer.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* --- Animations --- */
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 103, 0, 0); }
      50% { box-shadow: 0 0 20px 4px rgba(255, 103, 0, 0.15); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes progressPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    header {
      width: 100%;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
      animation: fadeSlideDown 0.4s ease;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #FF6700;
      letter-spacing: -0.5px;
      transition: transform 0.2s;
    }

    .logo:hover { transform: scale(1.03); }

    .logo span { color: #fff; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .download-count {
      font-size: 13px;
      color: #89898B;
    }

    .download-count strong {
      color: #FF6700;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 720px;
      padding: 60px 20px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      animation: fadeSlideIn 0.5s ease;
    }

    h1 span { color: #FF6700; }

    .subtitle {
      color: #89898B;
      font-size: 15px;
      margin-bottom: 40px;
      text-align: center;
      animation: fadeSlideIn 0.5s ease 0.1s both;
    }

    .download-box {
      width: 100%;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 32px;
      border: 1px solid #2a2a2a;
      animation: fadeSlideIn 0.5s ease 0.2s both;
      transition: border-color 0.3s;
      position: relative;
    }

    .download-box:focus-within {
      border-color: #333;
    }

    .download-box.dragover {
      border-color: #FF6700;
      background: #1f1a14;
    }

    /* Single track waveform */
    .single-track-waveform {
      margin-top: 16px;
      border-radius: 6px;
      overflow: hidden;
      display: none;
    }

    .single-track-waveform.active { display: block; animation: fadeSlideIn 0.3s ease; }

    /* Success confetti overlay */
    @keyframes confettiFall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(60px) rotate(720deg); opacity: 0; }
    }

    .confetti-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 16px;
      z-index: 10;
    }

    .confetti {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 1px;
      animation: confettiFall 1.5s ease-out forwards;
    }

    .link-preview {
      display: none;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding: 16px;
      background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
      border-radius: 12px;
      border: 1px solid #2a2a2a;
    }

    .link-preview.active {
      display: flex;
      animation: scaleIn 0.3s ease;
    }

    .link-preview-art {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      object-fit: cover;
      background: #2a2a2a;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    .link-preview:hover .link-preview-art {
      transform: scale(1.05);
    }

    .link-preview-info { flex: 1; min-width: 0; }

    .link-preview-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-preview-meta {
      font-size: 12px;
      color: #89898B;
    }

    .link-preview-meta span {
      color: #FF6700;
      font-weight: 600;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 10px;
      border: 2px solid #2a2a2a;
      background: #111;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #FF6700;
      box-shadow: 0 0 0 3px rgba(255, 103, 0, 0.1);
    }
    .input-row input::placeholder { color: #555; }

    .format-select {
      position: relative;
      min-width: 110px;
    }

    .format-select select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 2px solid #2a2a2a;
      background: #111;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }

    .format-select select:focus { border-color: #FF6700; }

    .format-select::after {
      content: '\25BC';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #FF6700;
      font-size: 10px;
      pointer-events: none;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn-download {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #FF6700, #ff8c3a);
      background-size: 200% 200%;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.3s, filter 0.2s;
      box-shadow: 0 4px 15px rgba(255, 103, 0, 0.2);
    }

    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 25px rgba(255, 103, 0, 0.35);
      filter: brightness(1.05);
    }

    .btn-download:active { transform: translateY(0) scale(0.98); }

    .btn-download:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      filter: none;
      animation: none;
    }

    .btn-cancel {
      display: none;
      padding: 16px 24px;
      border: 2px solid #ff3b30;
      border-radius: 10px;
      background: transparent;
      color: #ff3b30;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover { background: rgba(255, 59, 48, 0.1); }
    .btn-cancel.active {
      display: block;
      animation: scaleIn 0.2s ease;
    }

    .progress-section {
      display: none;
      margin-top: 24px;
    }

    .progress-section.active {
      display: block;
      animation: fadeSlideIn 0.3s ease;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .progress-status {
      color: #FF6700;
      font-weight: 600;
      animation: progressPulse 2s ease-in-out infinite;
    }
    .progress-percent { color: #89898B; }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6700, #ff8c3a, #FF6700);
      background-size: 200% 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: shimmer 2s linear infinite;
    }

    .track-info {
      display: none;
      margin-top: 20px;
      padding: 16px;
      background: #111;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
    }

    .track-info.active {
      display: flex;
      align-items: center;
      gap: 16px;
      animation: scaleIn 0.3s ease;
    }

    .track-artwork {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    .track-details { flex: 1; min-width: 0; }

    .track-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 12px;
      color: #89898B;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-album {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-format {
      font-size: 11px;
      color: #FF6700;
      background: rgba(255, 103, 0, 0.1);
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      flex-shrink: 0;
    }


    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .message.error {
      display: block;
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.3);
      color: #ff3b30;
      animation: fadeSlideIn 0.3s ease;
    }

    .message.success {
      display: block;
      background: rgba(52, 199, 89, 0.1);
      border: 1px solid rgba(52, 199, 89, 0.3);
      color: #34c759;
      animation: fadeSlideIn 0.3s ease;
    }

    .message.cancelled {
      display: block;
      background: rgba(255, 204, 0, 0.1);
      border: 1px solid rgba(255, 204, 0, 0.3);
      color: #ffcc00;
      animation: fadeSlideIn 0.3s ease;
    }

    .playlist-section {
      display: none;
      margin-top: 20px;
    }

    .playlist-section.active {
      display: block;
      animation: fadeSlideIn 0.3s ease;
    }

    .playlist-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .playlist-header {
      font-size: 14px;
      font-weight: 600;
      color: #FF6700;
    }

    .playlist-count {
      font-size: 12px;
      color: #89898B;
    }

    .playlist-items {
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .playlist-items::-webkit-scrollbar { width: 6px; }
    .playlist-items::-webkit-scrollbar-track { background: #111; border-radius: 3px; }
    .playlist-items::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .playlist-track {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #111;
      border-radius: 8px;
      font-size: 12px;
      transition: background 0.2s, transform 0.15s;
    }

    .playlist-track:hover {
      background: #1a1a1a;
      transform: translateX(4px);
    }

    .playlist-track-artwork {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      object-fit: cover;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    .playlist-track-num {
      color: #555;
      min-width: 24px;
      flex-shrink: 0;
    }

    .playlist-track-info {
      flex: 1;
      min-width: 0;
    }

    .playlist-track-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .playlist-track-artist {
      font-size: 10px;
      color: #89898B;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .playlist-track-status {
      font-size: 11px;
      color: #89898B;
      flex-shrink: 0;
    }

    .playlist-track-status.done { color: #34c759; }
    .playlist-track-status.downloading { color: #FF6700; }
    .playlist-track-status.failed { color: #ff3b30; }
    .playlist-track-status.cancelled { color: #ffcc00; }

    /* Preview player */
    .preview-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding: 12px 16px;
      background: #111;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
    }

    .preview-toggle-label {
      font-size: 13px;
      color: #89898B;
      flex: 1;
    }

    .preview-toggle-label strong {
      color: #fff;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #2a2a2a;
      border-radius: 12px;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #666;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: rgba(255, 103, 0, 0.3);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
      background: #FF6700;
    }

    .preview-player {
      display: none;
      margin-top: 12px;
      padding: 14px 16px;
      background: #111;
      border-radius: 10px;
      border: 1px solid #FF6700;
    }

    .preview-player.active {
      display: block;
      animation: scaleIn 0.3s ease, pulseGlow 3s ease-in-out infinite;
    }

    .preview-player-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .preview-now-playing {
      font-size: 11px;
      color: #FF6700;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .preview-track-name {
      font-size: 12px;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-btn {
      background: none;
      border: none;
      color: #FF6700;
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      transition: opacity 0.2s;
    }

    .preview-btn:hover { opacity: 0.7; }

    .preview-waveform {
      margin-top: 8px;
      border-radius: 6px;
      overflow: hidden;
    }

    .preview-time {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: #555;
    }

    /* Fixed bottom player */
    .fixed-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      border-top: 1px solid #2a2a2a;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .fixed-player.visible {
      transform: translateY(0);
    }

    .fixed-player-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    .fixed-player-badge {
      font-size: 9px;
      color: #FF6700;
      font-weight: 700;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .fixed-player-name {
      font-size: 12px;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .fixed-player-time {
      font-size: 11px;
      color: #89898B;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .fixed-player-skip {
      background: none;
      border: none;
      color: #FF6700;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 6px;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .fixed-player-skip:hover { opacity: 0.7; }

    .fixed-player-progress {
      height: 3px;
      background: #FF6700;
      width: 0%;
      transition: width 0.3s linear;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #333;
      border-top-color: #FF6700;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      .logo { font-size: 18px; }
      .download-count { font-size: 11px; }

      main { padding: 24px 12px; }
      h1 { font-size: 22px; }
      .subtitle { font-size: 13px; margin-bottom: 24px; }

      .download-box { padding: 16px; }
      .link-preview { gap: 12px; padding: 12px; }
      .link-preview-art { width: 56px; height: 56px; }
      .link-preview-title { font-size: 14px; }
      .link-preview-meta { font-size: 11px; }
      .input-row { flex-direction: column; }
      .input-row input { font-size: 14px; padding: 12px 14px; }
      .format-select { min-width: 100%; }
      .format-select select { padding: 12px 14px; }

      .btn-row { flex-direction: column; }
      .btn-download { padding: 14px; font-size: 15px; }
      .btn-cancel { padding: 14px; font-size: 15px; }

      .track-info.active { flex-direction: row; gap: 12px; padding: 12px; }
      .track-artwork { width: 48px; height: 48px; }
      .track-title { font-size: 13px; }
      .track-artist { font-size: 11px; }
      .track-album { font-size: 10px; }

      .playlist-header-row { flex-direction: column; align-items: flex-start; gap: 4px; }
      .playlist-track { padding: 6px 8px; gap: 8px; }
      .playlist-track-artwork { width: 28px; height: 28px; }
      .playlist-track-num { min-width: 18px; font-size: 11px; }
      .playlist-track-title { font-size: 11px; }
      .playlist-track-artist { font-size: 9px; }
      .playlist-track-status { font-size: 10px; }
      .playlist-items { max-height: 220px; }

      .preview-toggle { padding: 10px 12px; gap: 8px; }
      .preview-toggle-label { font-size: 12px; }
      .preview-player { padding: 10px 12px; animation: none; }
      .preview-player-header { gap: 6px; margin-bottom: 8px; }
      .preview-now-playing { font-size: 9px; }
      .preview-track-name { font-size: 11px; }
      .preview-visualizer { height: 28px; }

      .fixed-player-inner { padding: 8px 14px; gap: 8px; }
      .fixed-player-badge { font-size: 8px; }
      .fixed-player-name { font-size: 11px; }

      .progress-info { font-size: 12px; }
      .message { font-size: 12px; padding: 10px 12px; }
    }

    @media (max-width: 380px) {
      h1 { font-size: 19px; }
      .subtitle { font-size: 12px; }
      .download-box { padding: 12px; }
      .playlist-track-num { display: none; }
      .track-format { padding: 3px 6px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Rip<span>Tide</span></div>
    <div class="header-right">
      <div class="download-count">Downloads: <strong id="totalDownloads">0</strong></div>
    </div>
  </header>

  <main>
    <h1>Download <span>SoundCloud</span> Tracks</h1>
    <p class="subtitle">Paste a SoundCloud link, pick your format, and download at 320kbps</p>

    <div class="download-box">
      <div class="link-preview" id="linkPreview">
        <img class="link-preview-art" id="linkPreviewArt" src="" alt="">
        <div class="link-preview-info">
          <div class="link-preview-title" id="linkPreviewTitle"></div>
          <div class="link-preview-meta" id="linkPreviewMeta"></div>
        </div>
      </div>

      <div class="input-row">
        <input type="text" id="urlInput" placeholder="Paste SoundCloud song or playlist link..." autofocus>
        <div class="format-select">
          <select id="formatSelect">
            <option value="mp3">MP3</option>
            <option value="wav">WAV</option>
            <option value="aac">AAC</option>
            <option value="flac">FLAC</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-download" id="downloadBtn">Download</button>
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
      </div>

      <div class="message" id="message"></div>

      <div class="progress-section" id="progressSection">
        <div class="progress-info">
          <span class="progress-status" id="progressStatus">Fetching track info...</span>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="track-info" id="trackInfo">
        <img class="track-artwork" id="trackArtwork" src="" alt="">
        <div class="track-details">
          <div class="track-title" id="trackTitle"></div>
          <div class="track-artist" id="trackArtist"></div>
          <div class="track-album" id="trackAlbum"></div>
        </div>
        <span class="track-format" id="trackFormat"></span>
      </div>

      <div class="single-track-waveform" id="singleTrackWaveform"></div>

      <div class="playlist-section" id="playlistSection">
        <div class="playlist-header-row">
          <div class="playlist-header" id="playlistHeader"></div>
          <div class="playlist-count" id="playlistCount"></div>
        </div>
        <div class="playlist-items" id="playlistItems"></div>

        <div class="preview-toggle" id="previewToggle">
          <div class="preview-toggle-label"><strong>Preview</strong> — listen to clips while downloading</div>
          <label class="toggle-switch">
            <input type="checkbox" id="previewEnabled">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="preview-player" id="previewPlayer">
          <div class="preview-player-header">
            <span class="preview-now-playing">Now Previewing</span>
            <span class="preview-track-name" id="previewTrackName">—</span>
            <button class="preview-btn" id="previewSkipBtn" title="Skip">&#9197;</button>
          </div>
          <div class="preview-waveform" id="previewWaveform"></div>
          <div class="preview-time">
            <span id="previewTimeElapsed">0:00</span>
            <span id="previewTimeTotal">0:15</span>
          </div>
        </div>
      </div>
    </div>

  </main>

  <div class="fixed-player" id="fixedPlayer">
    <div class="fixed-player-inner">
      <span class="fixed-player-badge">NOW PLAYING</span>
      <span class="fixed-player-name" id="fixedPlayerName">—</span>
      <span class="fixed-player-time" id="fixedPlayerTime">0:00</span>
      <button class="fixed-player-skip" id="fixedPlayerSkip" title="Skip">&#9197;</button>
    </div>
    <div class="fixed-player-progress" id="fixedPlayerProgress"></div>
  </div>

  <script>
    let totalDownloads = parseInt(localStorage.getItem('totalDownloads') || '0');
    let isDownloading = false;
    let currentSessionId = null;
    let currentJobId = null;
    let currentAbortController = null;
    let currentEventSource = null;

    document.getElementById('totalDownloads').textContent = totalDownloads;

    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startDownload();
    });
    document.getElementById('downloadBtn').addEventListener('click', startDownload);
    document.getElementById('cancelBtn').addEventListener('click', cancelDownload);

    // Auto-fetch info on paste
    let previewAbort = null;
    let lastPreviewedUrl = '';

    document.getElementById('urlInput').addEventListener('paste', (e) => {
      setTimeout(() => {
        const url = document.getElementById('urlInput').value.trim();
        if (url.includes('soundcloud.com') && url !== lastPreviewedUrl && !isDownloading) {
          fetchPreview(url);
        }
      }, 50);
    });

    async function fetchPreview(url) {
      if (previewAbort) previewAbort.abort();
      previewAbort = new AbortController();
      lastPreviewedUrl = url;

      document.getElementById('linkPreview').classList.remove('active');
      document.getElementById('message').className = 'message';

      try {
        const res = await fetch('/api/info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
          signal: previewAbort.signal
        });
        const info = await res.json();
        if (!res.ok) return;

        // Show the banner
        const preview = document.getElementById('linkPreview');
        const artEl = document.getElementById('linkPreviewArt');
        const titleEl = document.getElementById('linkPreviewTitle');
        const metaEl = document.getElementById('linkPreviewMeta');

        if (info.type === 'track') {
          titleEl.textContent = info.title;
          metaEl.innerHTML = escapeHtml(info.artist);
          if (info.artwork) { artEl.src = info.artwork; artEl.style.display = 'block'; }
          else { artEl.style.display = 'none'; }
        } else if (info.type === 'playlist') {
          titleEl.textContent = info.title;
          metaEl.innerHTML = `<span>${info.tracks.length}</span> tracks`;
          // Use first track's artwork as playlist cover
          const cover = info.tracks.find(t => t.artwork)?.artwork || '';
          if (cover) { artEl.src = cover; artEl.style.display = 'block'; }
          else { artEl.style.display = 'none'; }
        }

        preview.classList.add('active');
        window._previewedInfo = info;
      } catch (e) {
        // Ignore abort errors
      }
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      if (type !== 'cancelled') {
        setTimeout(() => { msg.className = 'message'; }, 5000);
      }
    }

    function setProgress(percent, status) {
      document.getElementById('progressSection').classList.add('active');
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('progressPercent').textContent = Math.round(percent) + '%';
      if (status) document.getElementById('progressStatus').textContent = status;
    }

    function hideProgress() {
      document.getElementById('progressSection').classList.remove('active');
      document.getElementById('progressFill').style.width = '0%';
    }

    function setDownloadingState(active) {
      isDownloading = active;
      const btn = document.getElementById('downloadBtn');
      const cancelBtn = document.getElementById('cancelBtn');

      if (active) {
        currentSessionId = 'session-' + Date.now();
        currentAbortController = new AbortController();
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Processing...';
        cancelBtn.classList.add('active');
      } else {
        btn.disabled = false;
        btn.textContent = 'Download';
        cancelBtn.classList.remove('active');
        currentAbortController = null;
        if (currentEventSource) {
          currentEventSource.close();
          currentEventSource = null;
        }
      }
    }

    async function cancelDownload() {
      if (!isDownloading) return;

      fetch('/api/cancel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: currentSessionId, jobId: currentJobId })
      }).catch(() => {});

      if (currentAbortController) currentAbortController.abort();
      if (currentEventSource) { currentEventSource.close(); currentEventSource = null; }
      stopPreview();

      currentJobId = null;
      setDownloadingState(false);
      hideProgress();
      document.getElementById('playlistSection').classList.remove('active');
      document.getElementById('trackInfo').classList.remove('active');
      document.getElementById('linkPreview').classList.remove('active');
      hideSingleTrackWaveform();
      showMessage('Download cancelled', 'cancelled');
    }

    async function startDownload() {
      if (isDownloading) return;

      const url = document.getElementById('urlInput').value.trim();
      const format = document.getElementById('formatSelect').value;

      if (!url) { showMessage('Please paste a SoundCloud link', 'error'); return; }
      if (!url.includes('soundcloud.com')) { showMessage('Please enter a valid SoundCloud URL', 'error'); return; }

      setDownloadingState(true);
      document.getElementById('message').className = 'message';
      document.getElementById('linkPreview').classList.remove('active');

      try {
        // Reuse previewed info if it matches the current URL
        let info;
        if (window._previewedInfo && lastPreviewedUrl === url) {
          info = window._previewedInfo;
          setProgress(10, 'Starting download...');
        } else {
          setProgress(5, 'Fetching track info...');
          const infoRes = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
            signal: currentAbortController.signal
          });
          info = await infoRes.json();
          if (!infoRes.ok) throw new Error(info.error || 'Failed to fetch track info');
        }

        if (info.type === 'track') {
          await downloadSingleTrack(info, url, format);
        } else if (info.type === 'playlist') {
          await downloadPlaylist(info, format);
        }

      } catch (err) {
        if (err.name === 'AbortError') return;
        hideProgress();
        showMessage(err.message, 'error');
      } finally {
        setDownloadingState(false);
        setTimeout(hideProgress, 3000);
      }
    }

    async function downloadSingleTrack(info, originalUrl, format) {
      showTrackInfo(info, format);
      hideSingleTrackWaveform();
      setProgress(20, 'Downloading and converting...');

      const trackUrl = info.url || originalUrl;
      const dlRes = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: trackUrl, format, sessionId: currentSessionId }),
        signal: currentAbortController.signal
      });

      if (!dlRes.ok) {
        const err = await dlRes.json();
        throw new Error(err.error || 'Download failed');
      }

      setProgress(80, 'Preparing file...');
      const blob = await dlRes.blob();
      const filename = sanitizeFilename(info.artist + ' - ' + info.title) + '.' + format;
      triggerBrowserDownload(blob, filename);

      setProgress(100, 'Complete!');
      addToHistory();
      showConfetti();
      showMessage('Download complete!', 'success');

      // Show interactive waveform of the downloaded track
      showSingleTrackWaveform(blob);
    }

    async function downloadPlaylist(info, format) {
      showPlaylistInfo(info, format);
      setProgress(10, `Starting playlist download (${info.tracks.length} tracks)...`);

      // Start the job (returns immediately)
      const startRes = await fetch('/api/start-playlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tracks: info.tracks,
          format,
          playlistName: info.title
        }),
        signal: currentAbortController.signal
      });

      const { jobId } = await startRes.json();
      if (!startRes.ok) throw new Error('Failed to start playlist download');

      currentJobId = jobId;

      // Set up preview track names
      previewTrackNames = info.tracks.map(t => t.artist + ' - ' + t.title);

      // Listen for progress via SSE
      const previewSeen = new Set();
      await new Promise((resolve, reject) => {
        const es = new EventSource(`/api/progress/${jobId}`);
        currentEventSource = es;

        es.onmessage = (event) => {
          const data = JSON.parse(event.data);

          // Update track statuses
          if (data.trackStatuses) {
            data.trackStatuses.forEach((status, i) => {
              updatePlaylistTrackStatus(i, status);
            });
          }

          // Update track info with enriched metadata from server
          if (data.trackMeta) {
            data.trackMeta.forEach((meta, i) => {
              if (meta) {
                // Update playlist track display
                const titleEl = document.querySelector(`#playlist-track-${i} .playlist-track-title`);
                const artistEl = document.querySelector(`#playlist-track-${i} .playlist-track-artist`);
                const artEl = document.querySelector(`#playlist-track-${i} .playlist-track-artwork`);
                if (titleEl && meta.title) titleEl.textContent = meta.title;
                if (artistEl && meta.artist) artistEl.textContent = meta.artist;
                if (artEl && meta.artwork && artEl.tagName !== 'IMG') {
                  const img = document.createElement('img');
                  img.className = 'playlist-track-artwork';
                  img.src = meta.artwork;
                  img.alt = '';
                  artEl.replaceWith(img);
                } else if (artEl && artEl.tagName === 'IMG' && meta.artwork) {
                  artEl.src = meta.artwork;
                }
                // Update preview name
                if (meta.artist && meta.title) {
                  previewTrackNames[i] = meta.artist + ' - ' + meta.title;
                }
                // Update info tracks for history
                if (info.tracks[i]) {
                  if (meta.title) info.tracks[i].title = meta.title;
                  if (meta.artist) info.tracks[i].artist = meta.artist;
                  if (meta.artwork) info.tracks[i].artwork = meta.artwork;
                }
              }
            });
          }

          // Trigger previews for newly ready tracks
          if (data.previewReady) {
            data.previewReady.forEach((ready, i) => {
              if (ready && !previewSeen.has(i)) {
                previewSeen.add(i);
                onPreviewReady(jobId, i, previewTrackNames[i]);
              }
            });
          }

          if (data.status === 'downloading') {
            const done = data.trackStatuses ? data.trackStatuses.filter(s => s === 'done').length : 0;
            setProgress(
              10 + (80 * done / data.totalTracks),
              `Downloading track ${data.currentTrack + 1} of ${data.totalTracks}...`
            );
          } else if (data.status === 'zipping') {
            setProgress(92, 'Creating zip file...');
          } else if (data.status === 'complete') {
            es.close();
            currentEventSource = null;
            resolve();
          } else if (data.status === 'error') {
            es.close();
            currentEventSource = null;
            reject(new Error(data.error || 'Playlist download failed'));
          } else if (data.status === 'cancelled') {
            es.close();
            currentEventSource = null;
            reject(new Error('Cancelled'));
          }
        };

        es.onerror = () => {
          es.close();
          currentEventSource = null;
          reject(new Error('Lost connection to server'));
        };
      });

      // Download the zip
      setProgress(95, 'Downloading zip...');
      const dlRes = await fetch(`/api/download-zip/${jobId}`, {
        signal: currentAbortController.signal
      });

      if (!dlRes.ok) throw new Error('Failed to download zip');

      const blob = await dlRes.blob();
      const filename = sanitizeFilename(info.title) + '.zip';
      triggerBrowserDownload(blob, filename);

      stopPreview();
      info.tracks.forEach((_, i) => updatePlaylistTrackStatus(i, 'done'));
      setProgress(100, 'Playlist complete!');
      info.tracks.forEach(() => addToHistory());
      showConfetti();
      showMessage(`Playlist downloaded! ${info.tracks.length} tracks zipped.`, 'success');
      currentJobId = null;
    }

    function showTrackInfo(info, format) {
      const el = document.getElementById('trackInfo');
      const artwork = document.getElementById('trackArtwork');
      const albumEl = document.getElementById('trackAlbum');

      if (info.artwork) { artwork.src = info.artwork; artwork.style.display = 'block'; }
      else { artwork.style.display = 'none'; }

      document.getElementById('trackTitle').textContent = info.title || 'Unknown Track';
      document.getElementById('trackArtist').textContent = info.artist || 'Unknown Artist';

      if (info.album) { albumEl.textContent = info.album; albumEl.style.display = 'block'; }
      else { albumEl.style.display = 'none'; }

      document.getElementById('trackFormat').textContent = format.toUpperCase();
      el.classList.add('active');
    }

    function showPlaylistInfo(info, format) {
      const section = document.getElementById('playlistSection');
      document.getElementById('playlistHeader').textContent = info.title;
      document.getElementById('playlistCount').textContent = `${info.tracks.length} tracks · ${format.toUpperCase()}`;

      document.getElementById('playlistItems').innerHTML = info.tracks.map((t, i) => `
        <div class="playlist-track" id="playlist-track-${i}">
          <span class="playlist-track-num">${i + 1}</span>
          ${t.artwork
            ? `<img class="playlist-track-artwork" src="${escapeHtml(t.artwork)}" alt="">`
            : `<div class="playlist-track-artwork"></div>`
          }
          <div class="playlist-track-info">
            <div class="playlist-track-title">${escapeHtml(t.title)}</div>
            <div class="playlist-track-artist">${escapeHtml(t.artist)}</div>
          </div>
          <span class="playlist-track-status" id="playlist-status-${i}">Pending</span>
        </div>
      `).join('');

      section.classList.add('active');
    }

    function updatePlaylistTrackStatus(index, status) {
      const el = document.getElementById(`playlist-status-${index}`);
      if (!el) return;
      el.className = 'playlist-track-status ' + status;
      const labels = { done: '✓ Done', downloading: '↓ Downloading...', failed: '✗ Failed', cancelled: '— Cancelled', pending: 'Pending' };
      el.textContent = labels[status] || status;
    }

    function triggerBrowserDownload(blob, filename) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }

    function sanitizeFilename(name) {
      return (name || 'download').replace(/[<>:"/\\|?*]/g, '').replace(/\s+/g, ' ').trim().substring(0, 120);
    }

    function addToHistory() {
      totalDownloads++;
      localStorage.setItem('totalDownloads', totalDownloads);
      document.getElementById('totalDownloads').textContent = totalDownloads;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // --- Preview player (wavesurfer.js) ---
    let wavesurferInstance = null;
    let previewPlaying = false;
    let previewCurrentIndex = -1;
    let previewNextIndex = 0;
    let previewJobId = null;
    let previewTrackNames = [];
    let previewReadySet = new Set();
    let previewClipTimer = null;

    const previewEnabledCheck = document.getElementById('previewEnabled');
    previewEnabledCheck.checked = localStorage.getItem('previewEnabled') !== 'false';

    previewEnabledCheck.addEventListener('change', () => {
      localStorage.setItem('previewEnabled', previewEnabledCheck.checked);
      if (!previewEnabledCheck.checked) stopPreview();
    });

    document.getElementById('previewSkipBtn').addEventListener('click', () => {
      advanceToNext();
    });

    function onPreviewReady(jobId, trackIndex, trackName) {
      previewJobId = jobId;
      if (!previewTrackNames[trackIndex]) previewTrackNames[trackIndex] = trackName;
      previewReadySet.add(trackIndex);

      if (previewEnabledCheck.checked && !previewPlaying && trackIndex === previewNextIndex) {
        playPreview(trackIndex);
      }
    }

    function advanceToNext() {
      if (previewClipTimer) { clearTimeout(previewClipTimer); previewClipTimer = null; }

      if (wavesurferInstance) {
        wavesurferInstance.stop();
      }
      previewPlaying = false;

      if (!previewEnabledCheck.checked) { stopPreview(); return; }

      previewNextIndex = previewCurrentIndex + 1;

      if (previewReadySet.has(previewNextIndex)) {
        playPreview(previewNextIndex);
      }
    }

    function playPreview(idx) {
      if (previewClipTimer) { clearTimeout(previewClipTimer); previewClipTimer = null; }

      previewReadySet.delete(idx);
      previewCurrentIndex = idx;
      previewNextIndex = idx + 1;
      previewPlaying = true;

      const player = document.getElementById('previewPlayer');
      player.classList.add('active');
      document.getElementById('previewTrackName').textContent =
        previewTrackNames[idx] || `Track ${idx + 1}`;

      const clipDuration = 10 + Math.random() * 10;

      // Destroy old instance
      if (wavesurferInstance) {
        wavesurferInstance.destroy();
        wavesurferInstance = null;
      }

      wavesurferInstance = WaveSurfer.create({
        container: '#previewWaveform',
        waveColor: 'rgba(255, 255, 255, 0.15)',
        progressColor: '#FF6700',
        cursorColor: '#fff',
        cursorWidth: 2,
        barWidth: 2,
        barGap: 1.5,
        barRadius: 2,
        height: 44,
        normalize: true,
        interact: false,
        url: `/api/preview/${previewJobId}/${idx}`,
      });

      wavesurferInstance.on('ready', () => {
        if (!previewPlaying) return;
        const dur = wavesurferInstance.getDuration();
        document.getElementById('previewTimeTotal').textContent = formatSec(dur);
        wavesurferInstance.play();

        // Auto-advance after clip duration
        previewClipTimer = setTimeout(() => {
          advanceToNext();
        }, clipDuration * 1000);
      });

      wavesurferInstance.on('timeupdate', (time) => {
        document.getElementById('previewTimeElapsed').textContent = formatSec(time);
      });

      wavesurferInstance.on('finish', () => {
        advanceToNext();
      });

      wavesurferInstance.on('error', () => {
        advanceToNext();
      });
    }

    function formatSec(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    function stopPreview() {
      if (previewClipTimer) { clearTimeout(previewClipTimer); previewClipTimer = null; }
      if (wavesurferInstance) {
        wavesurferInstance.destroy();
        wavesurferInstance = null;
      }
      previewPlaying = false;
      previewReadySet = new Set();
      previewCurrentIndex = -1;
      previewNextIndex = 0;
      previewTrackNames = [];
      document.getElementById('previewPlayer').classList.remove('active');
      document.getElementById('fixedPlayer').classList.remove('visible');
    }

    // --- Fixed bottom player ---
    const fixedPlayer = document.getElementById('fixedPlayer');
    let mainPlayerVisible = true;

    // Watch if the main preview player is in view
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        mainPlayerVisible = entry.isIntersecting;
        if (previewPlaying) {
          fixedPlayer.classList.toggle('visible', !mainPlayerVisible);
        }
      });
    }, { threshold: 0.3 });

    observer.observe(document.getElementById('previewPlayer'));

    // Sync fixed player content with wavesurfer
    function updateFixedPlayer(name, time, progress) {
      document.getElementById('fixedPlayerName').textContent = name;
      document.getElementById('fixedPlayerTime').textContent = time;
      document.getElementById('fixedPlayerProgress').style.width = (progress * 100) + '%';
    }

    // Hook into wavesurfer timeupdate — patch playPreview to sync
    const origPlayPreview = playPreview;
    playPreview = function(idx) {
      origPlayPreview(idx);

      // After wavesurfer is created, add sync listener
      if (wavesurferInstance) {
        wavesurferInstance.on('timeupdate', (time) => {
          const dur = wavesurferInstance.getDuration() || 1;
          const name = previewTrackNames[idx] || `Track ${idx + 1}`;
          updateFixedPlayer(name, formatSec(time), time / dur);

          // Show/hide based on scroll position
          if (previewPlaying && !mainPlayerVisible) {
            fixedPlayer.classList.add('visible');
          }
        });

        wavesurferInstance.on('finish', () => {
          fixedPlayer.classList.remove('visible');
        });
      }
    };

    // Fixed player skip button
    document.getElementById('fixedPlayerSkip').addEventListener('click', () => {
      advanceToNext();
    });

    // --- Drag and drop URL ---
    const downloadBox = document.querySelector('.download-box');

    downloadBox.addEventListener('dragover', (e) => {
      e.preventDefault();
      downloadBox.classList.add('dragover');
    });

    downloadBox.addEventListener('dragleave', () => {
      downloadBox.classList.remove('dragover');
    });

    downloadBox.addEventListener('drop', (e) => {
      e.preventDefault();
      downloadBox.classList.remove('dragover');
      const text = e.dataTransfer.getData('text/plain') || e.dataTransfer.getData('text/uri-list');
      if (text && text.includes('soundcloud.com')) {
        document.getElementById('urlInput').value = text.trim();
        if (!isDownloading) fetchPreview(text.trim());
      }
    });

    // --- Keyboard shortcuts ---
    document.addEventListener('keydown', (e) => {
      // Don't trigger if typing in input
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

      if (e.code === 'Space' && previewPlaying) {
        e.preventDefault();
        advanceToNext();
      }
      if (e.code === 'Escape' && isDownloading) {
        e.preventDefault();
        cancelDownload();
      }
    });

    // --- Download complete confetti ---
    function showConfetti() {
      const container = document.createElement('div');
      container.className = 'confetti-container';
      downloadBox.appendChild(container);

      const colors = ['#FF6700', '#ff8c3a', '#34c759', '#fff', '#ffcc00'];
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.top = Math.random() * 40 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = (Math.random() * 0.5) + 's';
        piece.style.animationDuration = (1 + Math.random() * 1) + 's';
        piece.style.width = (4 + Math.random() * 4) + 'px';
        piece.style.height = (4 + Math.random() * 4) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '1px';
        container.appendChild(piece);
      }
      setTimeout(() => container.remove(), 2500);
    }

    // --- Single track waveform preview ---
    let singleTrackWavesurfer = null;

    function showSingleTrackWaveform(blob) {
      const container = document.getElementById('singleTrackWaveform');
      container.classList.add('active');

      if (singleTrackWavesurfer) {
        singleTrackWavesurfer.destroy();
        singleTrackWavesurfer = null;
      }

      const url = URL.createObjectURL(blob);
      singleTrackWavesurfer = WaveSurfer.create({
        container: '#singleTrackWaveform',
        waveColor: 'rgba(255, 255, 255, 0.15)',
        progressColor: '#FF6700',
        cursorColor: '#fff',
        cursorWidth: 2,
        barWidth: 2,
        barGap: 1.5,
        barRadius: 2,
        height: 44,
        normalize: true,
        interact: true,
        url: url,
      });

      singleTrackWavesurfer.on('ready', () => {
        URL.revokeObjectURL(url);
      });

      singleTrackWavesurfer.on('interaction', () => {
        singleTrackWavesurfer.playPause();
      });
    }

    function hideSingleTrackWaveform() {
      if (singleTrackWavesurfer) {
        singleTrackWavesurfer.destroy();
        singleTrackWavesurfer = null;
      }
      document.getElementById('singleTrackWaveform').classList.remove('active');
    }
  </script>
</body>
</html>
